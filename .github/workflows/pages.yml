name: Deploy docs to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel in-progress so a deploy
# that started first always finishes.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── WASM ────────────────────────────────────────────────────────────

      - name: Install Rust toolchain (+ wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: wasm-${{ runner.os }}-

      # wasm-bindgen-cli must match the version in Cargo.lock exactly.
      - name: Install wasm-bindgen-cli (version from Cargo.lock)
        run: |
          WBV=$(awk '/^name = "wasm-bindgen"$/{getline; print}' Cargo.lock \
                | head -1 | sed -E 's/.*"(.*)".*/\1/')
          echo "Installing wasm-bindgen-cli $WBV"
          cargo install wasm-bindgen-cli --version "$WBV" --locked

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Build WASM module and generate browser bindings
        run: ./crates/shifty-wasm/build.sh

      - name: Copy WASM pkg into the playground
        run: cp -r crates/shifty-wasm/pkg docs/extra/playground/pkg

      # ── Sphinx docs ──────────────────────────────────────────────────────

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build benchmark chart data
        run: uv run benchmark/process_results.py
        continue-on-error: true  # benchmark data is optional; page degrades gracefully

      - name: Build Sphinx HTML
        working-directory: docs
        run: uv run --with "sphinx>=7" --with furo --no-project sphinx-build . _build/html

      # ── Deploy ───────────────────────────────────────────────────────────

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
