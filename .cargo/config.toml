# Shared Cargo environment for local and CI builds.
[env]
PKG_CONFIG_PATH = "/usr/lib/x86_64-linux-gnu/pkgconfig"
ROCKSDB_DYNAMIC = "1"
RUST_MIN_STACK = "16777216"

# Rust 1.90+ uses lld on Linux. perf needs this layout for accurate call stacks.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-Clink-arg=-Wl,--no-rosegment"]

# pyo3 extension-module doesn't link libpython; macOS linker needs this to allow
# undefined Python symbols (resolved at runtime by the interpreter).
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# wasm32 has no OS RNG; route getrandom 0.3 (pulled in by rand -> oxrdf/oxigraph
# for blank-node IDs) to the browser's crypto.getRandomValues. Pairs with the
# `wasm_js` feature on getrandom in crates/shifty-wasm/Cargo.toml.
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
